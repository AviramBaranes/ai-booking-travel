version: "2"
sql:
  - engine: "postgresql"
    queries:
      - "query/users_query.sql"
      - "query/refresh_tokens_query.sql"
      - "query/organizations_query.sql"
      - "query/offices_query.sql"
      - "query/contacts_query.sql"
    schema: "./migrations"
    gen:
      go:
        package: "db"
        out: "."
        sql_package: "pgx/v5"
        emit_interface: true
        emit_pointers_for_null_types: true
