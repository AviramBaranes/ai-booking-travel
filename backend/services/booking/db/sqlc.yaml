version: "2"
sql:
  - engine: "postgresql"
    queries:
      - "query/locations_query.sql"
      - "query/location_broker_codes_query.sql"
      - "query/hertz_markup_rates_query.sql"
      - "query/coupons_query.sql"
      - "query/currencies_query.sql"
      - "query/available_plans_snapshots_query.sql"
    schema: "./migrations"
    gen:
      go:
        package: "db"
        out: "."
        sql_package: "pgx/v5"
        emit_interface: true
        emit_pointers_for_null_types: true
