<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Critical Error</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f4f4f5;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        color: #18181b;
      }
      .wrapper {
        width: 100%;
        padding: 40px 16px;
        box-sizing: border-box;
      }
      .card {
        max-width: 560px;
        margin: 0 auto;
        background-color: #ffffff;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      }
      .header {
        background-color: #dc2626;
        padding: 24px 32px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .header-icon {
        font-size: 24px;
        line-height: 1;
      }
      .header h1 {
        margin: 0;
        color: #ffffff;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      .header p {
        margin: 2px 0 0;
        color: #fecaca;
        font-size: 13px;
      }
      .body {
        padding: 32px;
      }
      .label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #71717a;
        margin-bottom: 8px;
      }
      .message-box {
        background-color: #fef2f2;
        border: 1px solid #fecaca;
        border-left: 4px solid #dc2626;
        border-radius: 4px;
        padding: 16px 20px;
        font-size: 14px;
        line-height: 1.6;
        color: #3f3f46;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .divider {
        border: none;
        border-top: 1px solid #f4f4f5;
        margin: 28px 0;
      }
      .meta {
        font-size: 12px;
        color: #a1a1aa;
        line-height: 1.6;
      }
      .footer {
        background-color: #f9f9f9;
        border-top: 1px solid #f0f0f0;
        padding: 16px 32px;
        text-align: center;
        font-size: 12px;
        color: #a1a1aa;
      }
      .footer a {
        color: #71717a;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="card">
        <div class="header">
          <span class="header-icon">⚠️</span>
          <div>
            <h1>Critical Error Detected</h1>
            <p>Immediate attention required</p>
          </div>
        </div>

        <div class="body">
          <div class="label">Error Details</div>
          <div class="message-box">{{.Message}}</div>

          <hr class="divider" />

          <div class="meta">
            This is an automated alert from the AI Booking Travel platform.<br />
            Please investigate and resolve the issue as soon as possible.
          </div>
        </div>

        <div class="footer">
          AI Booking Travel &mdash; Internal Alerts &bull; Do not reply to this
          email
        </div>
      </div>
    </div>
  </body>
</html>
